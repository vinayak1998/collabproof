name: Verification gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-proof-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Reject stale or undocumented codebase-guide inventory
        run: python tools/update_codebase_guide.py --check --staged

      - name: Require an authored guide review in every pull-request commit
        if: github.event_name == 'pull_request'
        run: >-
          python tools/update_codebase_guide.py
          --require-each-commit-authored-review-from
          ${{ github.event.pull_request.base.sha }}

      - name: Require an authored guide review in every pushed commit
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: >-
          python tools/update_codebase_guide.py
          --require-each-commit-authored-review-from
          ${{ github.event.before }}

      - name: Validate the versioned Git hooks
        run: sh -n .githooks/pre-commit .githooks/pre-merge-commit

      - name: Set up and build pinned Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          lint: false

      - name: Install pinned test and proof dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Verify the pinned environment is consistent
        run: python -m pip check

      - name: Run the full Python test suite
        run: python -m pytest -q

      - name: Run the Z3 proofs and implementation binding
        run: python proofs/prove_cliff.py

      - name: Check Python, JavaScript, and Lean parity for s.194R
        run: python proofs/check_lean_parity.py

      - name: Regenerate Python-to-JavaScript parity fixtures
        run: python gen_parity_vectors.py

      - name: Reject stale generated fixtures
        run: git diff --exit-code -- docs/parity_vectors.js

      - name: Replay assessment and certification fixtures in Node.js
        run: node docs/parity_check_node.js
